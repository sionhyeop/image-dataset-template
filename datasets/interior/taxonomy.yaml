_name: "인테리어 공간 데이터셋"

# 인테리어 공간 사진 — 라벨 스키마 SSOT.
#
# 이 축들은 **실제 수집 이미지 12장을 보고** 지었다(2026-07-14). 도메인 상식이 아니다.
# 본 것에서 나온 결정:
#   · 화면비가 16:9·3:2·1:1·3:4 로 전부 나온다 → aspect 점수를 완만하게. 가로만 우대하면 안 된다.
#   · **3D 렌더·AI 생성물이 절반 가까이 섞인다.** 이 도메인 고유의 오염이라 축으로 세웠다(render).
#     CLIP 이 이걸 읽을 수 있는지는 모른다 — 그래서 축으로 두고 axis_audit 에게 판정을 맡긴다.
#   · 사람이 거의 안 나온다 → _semantic 에 facing/framing/count 를 선언하지 않는다(인물 스택 자동 비활성).
#
# ⚠ 라벨은 아직 가설이다. 검수 30장 이후 axis_audit.py 가 죽은 축을 알려준다.

_axes:
  - {key: space,    name: 공간,   multi: false, composition: true, mode: assisted}
  - {key: view,     name: 시점,   multi: false, composition: true, mode: assisted}
  - {key: lighting, name: 조명,   multi: true,  composition: true, mode: assisted}
  - {key: style,    name: 스타일, multi: true,  composition: true, mode: assisted}
  - {key: render,   name: 이미지원, multi: false, composition: false, mode: assisted}

_coverage_min: 8

# 스칼라 부가 컬럼이 없는 도메인이다(인물의 korean_prob, 음식의 appetizing 자리).
# 없어도 되는지 확인하는 것도 이 데이터셋의 몫이다.
_extra_fields: []

_exclusive:
  view:
    - [V01_frontal, V02_corner, V03_highangle, V04_detail]
  render:
    - [G01_photo, G02_render]

_chip_groups:
  space:
    - [R01_living, R02_kitchen, R03_bedroom]
    - [R04_bathroom, R05_workspace, R06_cafe_shop]
  lighting:
    - [L01_daylight, L02_warm, L03_bright_white, L04_dim]

_semantic:
  place:
    axis: space
  pair:
    x: space
    y: view

_curation:
  purpose: "인테리어 공간 사진의 구도·조명 레퍼런스"

  intake:
    min_side: 512
    max_aspect: 2.4        # 실측: 16:9(1.78) 가 흔하다. 인물(3.0)·음식(2.0) 과 또 다르다.
    phash_hamming: 8

  # 본 것에 근거한 점수. **가로만 우대하지 않는다** — 세로 3:4 컷이 실제로 많았다.
  score:
    aspect:
      - {lo: 1.30, hi: 1.90, points: 2}    # 와이드 (공간 전체를 담는 표준)
      - {lo: 0.95, hi: 1.30, points: 1}    # 정사각~완만한 가로
      - {lo: 0.65, hi: 0.95, points: 1}    # 세로 (핀터레스트형) — 감점하지 않는다
      - {lo: 0.00, hi: 0.50, points: -2}
    resolution:
      - {min: 1200, points: 2}
      - {min: 800, points: 1}
      - {max: 500, points: -2}
    # 손으로 찍지 않는다. 검수 50장쯤 쌓이면 gate_audit.py 가 측정해서 덮어쓴다.
    weights:
      clip_score: 1.0
      person_score: 1.0      # 여기서는 '가구 검출 개수' 점수다 (아래 detect.classes)
      resolution_score: 1.0
      aspect_score: 1.0
      keyword_score: 1.0

  # 주 피사체가 '물건'도 '사람'도 아닌 **공간**이다. 그래서 가구를 대리 지표로 쓴다 —
  # 가구가 하나도 안 잡히면 실내 사진이 아닐 가능성이 높다.
  detect:
    backend: rtdetr
    classes: [couch, chair, bed, dining table, potted plant, tv, sink, toilet, refrigerator, oven]
    min_area: 0.02         # 가구는 넓은 방에서 작게 잡힌다 (인물 0.05 보다 낮춰야 한다)
    conf: 0.35

  gates: []                # gate_audit.py 가 측정해서 채운다
  rank:
    - {signal: clip_score}
  balance: [space, view, lighting, style]

# --- 축별 코드 ---------------------------------------------------------------

space:               # 어떤 공간인가 (단일)
  R01_living: "거실"
  R02_kitchen: "주방/다이닝"
  R03_bedroom: "침실"
  R04_bathroom: "욕실"
  R05_workspace: "서재/홈오피스"
  R06_cafe_shop: "카페/상업공간"

view:                # 카메라 시점 (단일 — 배타)
  V01_frontal: "정면 벽 (1점 투시)"
  V02_corner: "코너 (2점 투시)"
  V03_highangle: "부감 (위에서)"
  V04_detail: "부분/디테일 클로즈업"

lighting:            # 조명 (다중 — 창가 자연광 + 웜 조명이 같이 성립한다)
  L01_daylight: "창가 자연광"
  L02_warm: "따뜻한 인공조명"
  L03_bright_white: "밝은 화이트"
  L04_dim: "어두운 무드"

style:               # 마감·무드 (다중)
  T01_minimal: "미니멀/화이트"
  T02_wood: "우드/내추럴"
  T03_dark_modern: "다크/모던"
  T04_vintage: "빈티지/러스틱"
  T05_industrial: "인더스트리얼"

render:              # 실사진인가 렌더인가 (단일 — 이 도메인 고유의 오염)
  G01_photo: "실사진"
  G02_render: "3D 렌더/AI 생성"
